<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="format-detection" content="telephone=no" />
  <title>Mind Room</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <div id="scene-root" class="scene-root" aria-label="3D memo room"></div>

    <div class="noise-layer" aria-hidden="true"></div>
    <div class="ambient-glow ambient-glow-a" aria-hidden="true"></div>
    <div class="ambient-glow ambient-glow-b" aria-hidden="true"></div>

    <div id="permission-modal" class="modal-backdrop visible" role="dialog" aria-modal="true" aria-labelledby="permission-title">
      <div class="modal-panel glass-panel">
        <div class="modal-copy">
          <h1 id="permission-title">마이크와 기울기 권한을 허용해줘</h1>
        </div>
        <div class="modal-actions">
          <button id="allow-mic" type="button" class="primary-btn">허용</button>
        </div>
      </div>
    </div>

    <section id="entry-panel" class="entry-panel glass-panel hidden" aria-label="메모 입력 패널">
      <button id="close-entry-btn" type="button" class="icon-close-btn" aria-label="입력 패널 닫기">✕</button>

      <div class="entry-head">
        <div>
          <h2>새 메모</h2>
          <p class="support-copy">카테고리를 고르고 기록해.</p>
        </div>
      </div>

      <div class="chip-block">
        <div id="category-grid" class="chip-grid compact-chip-grid" role="group" aria-label="카테고리 선택">
          <button type="button" class="chip" data-category="emotion">감정</button>
          <button type="button" class="chip" data-category="record">기록</button>
          <button type="button" class="chip" data-category="clutter">잡생각</button>
          <button type="button" class="chip" data-category="routine">정리</button>
          <button type="button" class="chip" data-category="snack">다짐</button>
        </div>
      </div>

      <div id="emotion-tone-wrap" class="tone-wrap micro-tone-wrap hidden" aria-label="감정 톤 선택">
        <div class="micro-tone-grid chip-grid" role="group" aria-label="좋음 나쁨 선택">
          <button type="button" class="chip tone-chip micro-chip" data-tone="good">GOOD</button>
          <button type="button" class="chip tone-chip micro-chip" data-tone="bad">BAD</button>
        </div>
      </div>

      <p id="selection-copy" class="selection-copy">카테고리를 먼저 선택해.</p>

      <div class="transcript-box compact-transcript-box">
        <div class="transcript-top">
          <span id="mic-badge" class="mic-badge idle">대기</span>
        </div>
        <p id="transcript-text" class="compact-transcript-text" aria-live="polite"></p>
      </div>

      <div class="entry-foot">
        <button id="record-btn" type="button" class="primary-btn compact-record-btn" disabled>말하기</button>
      </div>
    </section>

    <section class="room-hud" aria-label="하단 도크">
      <div class="room-summary glass-panel">
        <div class="room-copy hidden">
          <h2 id="room-title">Mind Room</h2>
          <p id="room-subtitle" class="room-subtitle">메모가 방 안에 쌓여.</p>
        </div>

        <div class="room-stats" aria-live="polite">
          <span class="stat-pill">전체 <span id="memo-count">0</span></span>
          <span class="stat-pill">보이는 메모 <span id="active-visual-count">0</span></span>
        </div>

        <div class="room-actions-compact">
          <button id="new-memo-btn" type="button" class="ghost-btn compact-dock-btn">새 메모</button>
          <button id="open-history-btn" type="button" class="primary-btn compact-dock-btn">메모 보기</button>
        </div>
      </div>
    </section>

    <section id="history-panel" class="history-panel glass-panel hidden" aria-label="메모 기록">
      <button id="close-history-btn" type="button" class="icon-close-btn" aria-label="기록 패널 닫기">✕</button>
      <div class="history-head minimal-panel-head">
        <h2 class="sr-only">기록</h2>
      </div>
      <div id="history-list" class="history-list" aria-live="polite"></div>
    </section>

    <div id="memo-hover-card" class="memo-hover-card" aria-hidden="true">
      <p id="memo-hover-label" class="memo-hover-label"></p>
      <p id="memo-hover-text" class="memo-hover-text"></p>
    </div>

    <section id="memo-detail-panel" class="memo-detail-panel" aria-hidden="true">
      <p id="memo-detail-label" class="memo-detail-label"></p>
      <p id="memo-detail-date" class="memo-detail-date"></p>
      <p id="memo-detail-text" class="memo-detail-text"></p>
      <div class="memo-detail-actions">
        <button id="memo-detail-close" type="button" class="detail-btn">닫기</button>
        <button id="memo-detail-delete" type="button" class="detail-btn danger">삭제</button>
      </div>
    </section>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
